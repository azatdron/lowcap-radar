
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lowcap Radar AI v4.7</title>

<style>
:root{
--bg:#050816;
--card:#101827;
--line:#23385e;
--green:#5cf2a0;
--red:#ff6b8a;
--text:#ffffff;
--muted:#8ea2c7;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#0b1830 0%,#050816 45%,#02040a 100%);
color:white;
padding-bottom:120px;
}

.app{
max-width:560px;
margin:auto;
padding:18px 14px 40px;
}

.header{
display:flex;
gap:14px;
align-items:center;
}

.logo{
width:64px;
height:64px;
border-radius:18px;
background:#111b31;
border:1px solid #30456f;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:900;
color:var(--green);
}

.title{
font-size:32px;
font-weight:900;
line-height:1;
}

.sub{
margin-top:6px;
color:var(--muted);
font-size:14px;
}

.live{
margin-left:auto;
background:#0d2419;
border:1px solid #245f45;
color:#5cf2a0;
padding:8px 14px;
border-radius:999px;
font-weight:900;
}

.card,.coin{
margin-top:18px;
background:rgba(16,24,39,.95);
border:1px solid var(--line);
border-radius:28px;
padding:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#08101f;
border:1px solid #1d3155;
border-radius:18px;
padding:14px;
}

.label{
font-size:12px;
color:var(--muted);
}

.value{
font-size:22px;
font-weight:900;
margin-top:4px;
}

select,button{
width:100%;
margin-top:10px;
padding:14px;
border-radius:18px;
border:1px solid #2a3c61;
background:#08101f;
color:white;
font-size:16px;
}

button{
background:linear-gradient(135deg,#5cf2a0,#38e977);
border:none;
color:#03120a;
font-weight:900;
}

.marketHeat{
margin-top:12px;
padding:14px;
border-radius:18px;
font-weight:900;
text-align:center;
}

.hot{background:#12281d;color:#5cf2a0;border:1px solid #245f45;}
.mid{background:#2b2410;color:#ffd36a;border:1px solid #7a6330;}
.cold{background:#26131b;color:#ff8aa3;border:1px solid #6f2d42;}

.coinTop{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:56px;
height:56px;
border-radius:18px;
}

.name{
font-size:28px;
font-weight:900;
}

.sym{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

.score{
margin-left:auto;
font-size:42px;
font-weight:900;
color:var(--green);
}

.badges{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.badge{
padding:6px 10px;
border-radius:999px;
background:#142039;
border:1px solid #273b62;
font-size:12px;
}

.reason{
margin-top:12px;
padding:14px;
border-radius:18px;
background:#0a1222;
border:1px solid #20355d;
line-height:1.5;
color:#d2deee;
}

.pos{color:#5cf2a0;font-weight:900}
.neg{color:#ff6b8a;font-weight:900}

.tabs{
position:fixed;
left:18px;
right:18px;
bottom:18px;
max-width:530px;
margin:auto;
background:#0f172aee;
border:1px solid #26385f;
border-radius:28px;
padding:8px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

.tab{
padding:13px;
border-radius:18px;
text-align:center;
font-weight:900;
color:#94a3b8;
}

.active{
background:#1d2b49;
color:white;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">⌁</div>

<div>
<div class="title">Lowcap Radar AI</div>
<div class="sub">v4.7 • Rotation Engine</div>
</div>

<div class="live">LIVE</div>
</div>

<div class="card">

<div class="grid">
<div class="box">
<div class="label">Найдено</div>
<div class="value" id="found">0</div>
</div>

<div class="box">
<div class="label">Средний Score</div>
<div class="value" id="avg">—</div>
</div>
</div>

<select id="sector">
<option value="ai">AI / DePIN</option>
<option value="rwa">RWA</option>
<option value="gaming">Gaming</option>
<option value="solana">Solana</option>
<option value="infra">Infrastructure</option>
</select>

<select id="marketcap">
<option value="100000000">до $100M</option>
<option value="500000000" selected>до $500M</option>
<option value="1000000000">до $1B</option>
</select>

<select id="volume">
<option value="100000">$100K+</option>
<option value="500000" selected>$500K+</option>
<option value="1000000">$1M+</option>
</select>

<select id="risk">
<option value="safe">Низкий риск</option>
<option value="mid" selected>Средний риск</option>
<option value="high">Высокий потенциал</option>
</select>

<button onclick="scan()">Начать поиск</button>

<div id="heat" class="marketHeat mid">
Рынок нейтральный
</div>

</div>

<div id="results"></div>

</div>

<div class="tabs">
<div class="tab active">Радар</div>
<div class="tab">Watchlist</div>
<div class="tab">Источники</div>
</div>

<script>

const sectors = {
ai:["akash-network","render-token","bittensor","aethir","grass"],
rwa:["ondo-finance","centrifuge","mantra-dao"],
gaming:["immutable-x","gala","ronin"],
solana:["jupiter-exchange-solana","raydium","pyth-network"],
infra:["chainlink","the-graph","arweave"]
};

function fmt(n){
if(n>=1e9)return "$"+(n/1e9).toFixed(1)+"B";
if(n>=1e6)return "$"+(n/1e6).toFixed(1)+"M";
return "$"+Math.round(n/1000)+"K";
}

function trust(c){
let s=50;

if(c.market_cap_rank<100)s+=20;
else if(c.market_cap_rank<300)s+=12;
else s+=6;

if(c.total_volume>5000000)s+=15;
else if(c.total_volume>1000000)s+=10;

if(c.market_cap>100000000)s+=10;

if(c.price_change_percentage_24h>0)s+=8;

return Math.min(99,Math.round(s));
}

function marketHeat(data){

let positive=data.filter(x=>(x.price_change_percentage_24h||0)>0).length;
let ratio=positive/data.length;

let el=document.getElementById("heat");

if(ratio>0.7){
el.className='marketHeat hot';
el.innerText='🔥 Рынок горячий • идёт ротация капитала';
}
else if(ratio>0.4){
el.className='marketHeat mid';
el.innerText='⚡ Рынок нейтральный • выборочно сильные монеты';
}
else{
el.className='marketHeat cold';
el.innerText='❄️ Рынок слабый • осторожность';
}
}

async function scan(){

document.getElementById("results").innerHTML='<div class="card">Сканирование clean sources...</div>';

let sector=document.getElementById("sector").value;
let cap=Number(document.getElementById("marketcap").value);
let vol=Number(document.getElementById("volume").value);
let risk=document.getElementById("risk").value;

let ids=sectors[sector].join(",");

let url='https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids='+ids+'&sparkline=false&price_change_percentage=24h';

let r=await fetch(url);
let data=await r.json();

data=data.filter(c=>c.market_cap<=cap && c.total_volume>=vol);

if(risk==="safe"){
data=data.filter(c=>c.market_cap_rank<200);
}
if(risk==="high"){
data=data.filter(c=>c.market_cap_rank>200);
}

data.sort((a,b)=>trust(b)-trust(a));

document.getElementById("found").innerText=data.length;

if(data.length){
let avg=Math.round(data.reduce((a,b)=>a+trust(b),0)/data.length);
document.getElementById("avg").innerText=avg;
marketHeat(data);
}

render(data);

}

function render(data){

let root=document.getElementById("results");
root.innerHTML='';

if(!data.length){
root.innerHTML='<div class="card">Нет монет по этим критериям.</div>';
return;
}

data.forEach(c=>{

let change=Number(c.price_change_percentage_24h||0);
let cls=change>=0?'pos':'neg';

let unlockRisk='Низкий';

if(c.market_cap_rank>300) unlockRisk='Средний';
if(c.market_cap_rank>600) unlockRisk='Высокий';

let el=document.createElement("div");
el.className='coin';

el.innerHTML=`

<div class="coinTop">
<img class="avatar" src="${c.image}">
<div>
<div class="name">${c.name}</div>
<div class="sym">${c.symbol.toUpperCase()} • CoinGecko</div>
</div>
<div class="score">${trust(c)}</div>
</div>

<div class="badges">
<div class="badge">Trust Score</div>
<div class="badge">Clean Sources</div>
<div class="badge">Rotation Engine</div>
</div>

<div class="reason">
🧠 Почему выбрано:
<br><br>
• Market Cap: ${fmt(c.market_cap)}
<br>
• Объём 24ч: ${fmt(c.total_volume)}
<br>
• Rank CoinGecko: ${c.market_cap_rank}
<br>
• Unlock Risk: ${unlockRisk}
<br>
• Изменение 24ч:
<span class="${cls}">${change.toFixed(1)}%</span>
</div>

<div class="grid" style="margin-top:12px">

<div class="box">
<div class="label">Цена</div>
<div class="value">$${Number(c.current_price).toFixed(3)}</div>
</div>

<div class="box">
<div class="label">Объём</div>
<div class="value">${fmt(c.total_volume)}</div>
</div>

</div>

`;

root.appendChild(el);

});

}

scan();

</script>

</body>
</html>
