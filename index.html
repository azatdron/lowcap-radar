
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lowcap Radar AI</title>
<style>
:root{
--bg:#050816;
--card:#101827;
--box:#08101f;
--line:#22385d;
--text:#ffffff;
--muted:#94a3b8;
--green:#5cf2a0;
--red:#ff6b8a;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#0b1830 0,#050816 45%,#02040a 100%);
color:white;
padding-bottom:120px;
}
.app{
max-width:560px;
margin:auto;
padding:18px 14px 40px;
}
.header{
display:flex;
align-items:center;
gap:14px;
}
.logo{
width:62px;
height:62px;
border-radius:18px;
background:#111b31;
border:1px solid #30456f;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
color:var(--green);
font-weight:900;
}
.title{
font-size:30px;
font-weight:900;
}
.sub{
color:#94a3b8;
margin-top:4px;
font-size:14px;
}
.live{
margin-left:auto;
background:#0d2419;
border:1px solid #245f45;
color:#5cf2a0;
padding:8px 12px;
border-radius:999px;
font-weight:800;
font-size:12px;
}
.card,.coin{
margin-top:18px;
background:rgba(16,24,39,.95);
border:1px solid #22385d;
border-radius:28px;
padding:16px;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.box{
background:#08101f;
border:1px solid #1f3154;
border-radius:18px;
padding:14px;
}
.label{
font-size:12px;
color:#94a3b8;
}
.value{
font-size:20px;
font-weight:900;
margin-top:4px;
}
select,button{
width:100%;
margin-top:10px;
padding:14px;
border-radius:18px;
border:1px solid #2a3c61;
background:#08101f;
color:white;
font-size:16px;
}
button{
background:linear-gradient(135deg,#5cf2a0,#3ee779);
color:#03120a;
font-weight:900;
border:none;
}
.coinTop{
display:flex;
align-items:center;
gap:12px;
}
.avatar{
width:56px;
height:56px;
border-radius:18px;
object-fit:cover;
}
.name{
font-size:28px;
font-weight:900;
}
.sym{
font-size:14px;
color:#94a3b8;
margin-top:4px;
}
.score{
margin-left:auto;
font-size:42px;
font-weight:900;
color:#5cf2a0;
}
.badges{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}
.badge{
padding:6px 10px;
border-radius:999px;
background:#142039;
border:1px solid #273b62;
font-size:12px;
}
.reason{
margin-top:12px;
padding:14px;
border-radius:18px;
background:#0a1222;
border:1px solid #20355d;
line-height:1.5;
color:#c8d6e8;
}
.pos{color:#5cf2a0;font-weight:900}
.neg{color:#ff6b8a;font-weight:900}
.tabs{
position:fixed;
left:18px;
right:18px;
bottom:18px;
max-width:530px;
margin:auto;
background:#0f172aee;
border:1px solid #26385f;
border-radius:28px;
padding:8px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}
.tab{
padding:13px;
border-radius:18px;
text-align:center;
font-weight:900;
color:#94a3b8;
}
.active{
background:#1d2b49;
color:white;
}
</style>
</head>
<body>

<div class="app">

<div class="header">
<div class="logo">⌁</div>
<div>
<div class="title">Lowcap Radar AI</div>
<div class="sub">v4.6 • Clean Source Engine</div>
</div>
<div class="live">LIVE</div>
</div>

<div class="card">

<div class="grid">
<div class="box">
<div class="label">Найдено</div>
<div id="found" class="value">0</div>
</div>

<div class="box">
<div class="label">Средний score</div>
<div id="avg" class="value">—</div>
</div>
</div>

<select id="sector">
<option value="ai">AI / DePIN</option>
<option value="rwa">RWA</option>
<option value="gaming">Gaming</option>
<option value="solana">Solana</option>
</select>

<select id="marketcap">
<option value="100000000">до $100M</option>
<option value="500000000" selected>до $500M</option>
<option value="1000000000">до $1B</option>
</select>

<select id="volume">
<option value="100000">$100K+</option>
<option value="500000" selected>$500K+</option>
<option value="1000000">$1M+</option>
</select>

<button onclick="scan()">Начать поиск</button>

</div>

<div id="results"></div>

</div>

<div class="tabs">
<div class="tab active">Радар</div>
<div class="tab">Избранное</div>
<div class="tab">Источники</div>
</div>

<script>

const sectors = {
ai:["akash-network","grass","aethir","render-token","bittensor"],
rwa:["ondo-finance","centrifuge","mantra-dao"],
gaming:["immutable-x","gala","ronin"],
solana:["jupiter-exchange-solana","raydium","pyth-network"]
};

function fmt(n){
if(n>=1e9)return "$"+(n/1e9).toFixed(1)+"B";
if(n>=1e6)return "$"+(n/1e6).toFixed(1)+"M";
return "$"+Math.round(n/1000)+"K";
}

function score(c){
let s=50;
if(c.market_cap_rank<300)s+=15;
if(c.total_volume>1000000)s+=15;
if(c.market_cap>50000000)s+=10;
if(c.price_change_percentage_24h>0)s+=10;
return Math.min(99,Math.round(s));
}

async function scan(){

document.getElementById("results").innerHTML='<div class="card">Сканирование...</div>';

let sector=document.getElementById("sector").value;
let cap=Number(document.getElementById("marketcap").value);
let vol=Number(document.getElementById("volume").value);

let ids=sectors[sector].join(",");

let url='https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids='+ids+'&order=market_cap_desc&sparkline=false&price_change_percentage=24h';

let r=await fetch(url);
let data=await r.json();

data=data.filter(c=>c.market_cap<=cap && c.total_volume>=vol);

data.sort((a,b)=>score(b)-score(a));

document.getElementById("found").innerText=data.length;

if(data.length){
let avg=Math.round(data.reduce((a,b)=>a+score(b),0)/data.length);
document.getElementById("avg").innerText=avg;
}else{
document.getElementById("avg").innerText='—';
}

render(data);
}

function render(data){

let root=document.getElementById("results");
root.innerHTML='';

if(!data.length){
root.innerHTML='<div class="card">Нет монет по выбранным критериям.</div>';
return;
}

data.forEach(c=>{

let change=Number(c.price_change_percentage_24h||0);
let cls=change>=0?'pos':'neg';

let el=document.createElement("div");
el.className='coin';

el.innerHTML=`

<div class="coinTop">
<img class="avatar" src="${c.image}">
<div>
<div class="name">${c.name}</div>
<div class="sym">${c.symbol.toUpperCase()} • CoinGecko</div>
</div>
<div class="score">${score(c)}</div>
</div>

<div class="badges">
<div class="badge">Проверено</div>
<div class="badge">Clean Sources</div>
<div class="badge">Trust Score</div>
</div>

<div class="reason">
🧠 Почему выбрано:
<br><br>
• капитализация: ${fmt(c.market_cap)}
<br>
• объём 24ч: ${fmt(c.total_volume)}
<br>
• рейтинг CoinGecko: ${c.market_cap_rank}
<br>
• изменение 24ч:
<span class="${cls}">${change.toFixed(1)}%</span>
</div>

<div class="grid" style="margin-top:12px">

<div class="box">
<div class="label">Цена</div>
<div class="value">$${Number(c.current_price).toFixed(3)}</div>
</div>

<div class="box">
<div class="label">Market Cap</div>
<div class="value">${fmt(c.market_cap)}</div>
</div>

</div>

`;

root.appendChild(el);

});

}

scan();

</script>

</body>
</html>
